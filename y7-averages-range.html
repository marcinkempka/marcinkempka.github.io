<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Year 7 — Averages &amp; Range</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="quiz.css">
</head>
<!-- accent colour for this quiz (Year 7 = indigo). Change just this to re-theme one quiz. -->
<body style="--accent:#4F46E5">
<main class="wrap">

  <a class="back" href="year7.html"><span aria-hidden="true">&larr;</span> Back to Year 7</a>

  <header class="head">
    <p class="eyebrow">Year 7 &middot; Analysing &amp; displaying data</p>
    <h1>Averages &amp; Range</h1>
  </header>

  <!-- quiz shell — shared by every quiz; do not edit per quiz -->
  <div id="quiz">
    <div class="progress-row">
      <span id="counter">Question 1 of 10</span>
      <span id="runningScore">Score: 0</span>
    </div>
    <div class="bar"><i id="barFill"></i></div>
    <div class="card">
      <p class="qnum" id="qnum">Question 1</p>
      <p class="question" id="question">&nbsp;</p>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback">
        <p class="verdict" id="verdict"></p>
        <p class="why" id="why"></p>
      </div>
      <button class="next" id="nextBtn">Next question &rarr;</button>
    </div>
  </div>

  <div class="card result" id="result">
    <div class="score-num"><span id="finalScore">0</span><span id="outOf">/10</span></div>
    <p class="msg" id="resultMsg"></p>
    <p class="best" id="bestLine"></p>
    <div class="actions">
      <button class="btn primary" id="againBtn">Try again</button>
      <a class="btn ghost" href="year7.html">Back to Year 7</a>
    </div>
  </div>

</main>

<!-- ===== The only part that changes per quiz: questions ===== -->
<script>
window.QUIZ = {
  storeKey: "y7-averages-range",
  appendEquals: false,
  questions: [
    { q:"Find the mode of: 6, 3, 7, 3, 9, 3, 6, 1", answer:"3", options:["3","6","7","9"], why:"The mode is the most common value. 3 appears three times — more than any other number." },
    { q:"Find the mode of: 4, 8, 4, 2, 4, 8, 9", answer:"4", options:["4","8","2","9"], why:"4 appears three times, 8 appears twice. The most common value is 4." },
    { q:"Work out the median of: 15, 4, 9, 2, 11, 6, 8", answer:"8", options:["8","9","6","11"], why:"In order: 2, 4, 6, 8, 9, 11, 15. With 7 values the middle (4th) one is 8." },
    { q:"Work out the median of: 20, 7, 13, 5, 9, 16", answer:"11", options:["11","9","13","10"], why:"In order: 5, 7, 9, 13, 16, 20. The two middle values are 9 and 13, and (9 + 13) ÷ 2 = 11." },
    { q:"Work out the range of: 34, 12, 27, 5, 19", answer:"29", options:["29","34","22","12"], why:"Range = largest − smallest = 34 − 5 = 29." },
    { q:"Work out the mean of: 7, 2, 9, 4, 8", answer:"6", options:["6","5","7","30"], why:"Sum = 30, and there are 5 values. 30 ÷ 5 = 6." },
    { q:"Work out the mean of: 1.2, 0.8, 1.5, 0.5", answer:"1.0", options:["1.0","1.2","0.8","4.0"], why:"Sum = 4.0, divided by 4 values. 4.0 ÷ 4 = 1.0." },
    { q:"A shop counts customers each day: 12, 9, 15, 11, 8, 14, 15. What is the mean per day?", answer:"12", options:["12","11","13","84"], why:"Total = 84 over 7 days. 84 ÷ 7 = 12." },
    { q:"The mean of 5, 8, 6 and n is 7. What is n?", answer:"9", options:["9","7","8","6"], why:"Four values with mean 7 total 28. The known three add to 19, so n = 28 − 19 = 9." },
    { q:"For 5, 5, 6, 5, 6, 5, 40, which average best describes a 'typical' value?", answer:"Median", options:["Median","Mean","Mode","Range"], why:"The outlier 40 pulls the mean up to about 10. The median (5) better reflects what most of the values actually are." }
  ]
};
</script>
<script src="quiz.js"></script>
</body>
</html>
