<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Year 7 — Two-Way Tables &amp; Bar Charts</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="quiz.css">
</head>
<!-- accent colour for this quiz (Year 7 = indigo). Change just this to re-theme one quiz. -->
<body style="--accent:#4F46E5">
<main class="wrap">

  <a class="back" href="year7.html"><span aria-hidden="true">&larr;</span> Back to Year 7</a>

  <header class="head">
    <p class="eyebrow">Year 7 &middot; Analysing &amp; displaying data</p>
    <h1>Two-Way Tables &amp; Bar Charts</h1>
  </header>

  <!-- quiz shell — shared by every quiz; do not edit per quiz -->
  <div id="quiz">
    <div class="progress-row">
      <span id="counter">Question 1 of 10</span>
      <span id="runningScore">Score: 0</span>
    </div>
    <div class="bar"><i id="barFill"></i></div>
    <div class="card">
      <p class="qnum" id="qnum">Question 1</p>
      <p class="question" id="question">&nbsp;</p>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback">
        <p class="verdict" id="verdict"></p>
        <p class="why" id="why"></p>
      </div>
      <button class="next" id="nextBtn">Next question &rarr;</button>
    </div>
  </div>

  <div class="card result" id="result">
    <div class="score-num"><span id="finalScore">0</span><span id="outOf">/10</span></div>
    <p class="msg" id="resultMsg"></p>
    <p class="best" id="bestLine"></p>
    <div class="actions">
      <button class="btn primary" id="againBtn">Try again</button>
      <a class="btn ghost" href="year7.html">Back to Year 7</a>
    </div>
  </div>

</main>

<!-- ===== The only part that changes per quiz: questions ===== -->
<script>
window.QUIZ = {
  storeKey: "y7-two-way-tables",
  appendEquals: false,
  questions: [
    { q:"The two-way table shows press-ups completed at the weekend. What number goes in the highlighted cell?",
      table:[["","Sat","Sun","Total"],["Alan","20","22","?"],["Yolanda","20","15","35"],["Total","40","37","77"]],
      answer:"42", options:["42","40","35","77"],
      why:"Alan's row total = 20 + 22 = 42. You can check it: the overall total 77 minus Yolanda's 35 also gives 42." },
    { q:"What number goes in the highlighted cell of this two-way table?",
      table:[["","Sat","Sun","Total"],["Alan","20","22","42"],["Yolanda","20","15","35"],["Total","?","37","77"]],
      answer:"40", options:["40","42","37","35"],
      why:"The Saturday column total = 20 + 20 = 40." },
    { q:"What number goes in the highlighted cell — the overall total?",
      table:[["","Sat","Sun","Total"],["Alan","20","22","42"],["Yolanda","20","15","35"],["Total","40","37","?"]],
      answer:"77", options:["77","75","79","42"],
      why:"Add the row totals: 42 + 35 = 77. Adding the column totals, 40 + 37, gives the same answer — a good way to check." },
    { q:"Part of the data is missing. How many press-ups did Yolanda do on Sunday?",
      table:[["","Sat","Sun","Total"],["Alan","20","22","42"],["Yolanda","20","?","35"],["Total","40","37","77"]],
      answer:"15", options:["15","17","20","35"],
      why:"Yolanda's total is 35 and she did 20 on Saturday, so Sunday = 35 − 20 = 15. Check with the Sun column: 37 − 22 = 15." },
    { q:"The table shows items recycled in one month. What number goes in the highlighted cell?",
      table:[["","Cans","Glass","Plastic","Total"],["Sohal","45","50","45","140"],["Jenkins","35","20","65","120"],["Total","80","?","110","260"]],
      answer:"70", options:["70","75","65","60"],
      why:"The Glass column total = 50 + 20 = 70." },
    { q:"How many items did the Jenkins family recycle in total?",
      table:[["","Cans","Glass","Plastic","Total"],["Sohal","45","50","45","140"],["Jenkins","35","20","65","?"],["Total","80","70","110","260"]],
      answer:"120", options:["120","115","125","260"],
      why:"Jenkins row: 35 + 20 + 65 = 120. Check: overall total 260 minus Sohal's 140 = 120." },
    { q:"Which item did the Sohal family recycle the most of?",
      table:[["","Cans","Glass bottles","Plastic bottles","Cardboard","Newspapers"],["Sohal","45","50","45","20","30"]],
      answer:"Glass bottles", options:["Glass bottles","Cans","Plastic bottles","Newspapers"],
      why:"The highest number in the Sohal row is 50, in the Glass bottles column." },
    { q:"Hugh counted insects visiting flowers of each colour. How many insects visited blue flowers altogether?",
      table:[["","White","Yellow","Red","Blue","Green"],["Bees","7","15","2","18","1"],["Butterflies","7","10","8","3","3"]],
      answer:"21", options:["21","18","15","20"],
      why:"Add the Blue column: 18 bees + 3 butterflies = 21." },
    { q:"Using the same data, which colour is most attractive to bees?",
      table:[["","White","Yellow","Red","Blue","Green"],["Bees","7","15","2","18","1"],["Butterflies","7","10","8","3","3"]],
      answer:"Blue", options:["Blue","Yellow","White","Red"],
      why:"The biggest number in the Bees row is 18, in the Blue column." },
    { q:"In every two-way table, adding the row totals gives the same result as adding the column totals. What is this number?",
      answer:"The overall total", options:["The overall total","Zero","The largest value in the table","Double the overall total"],
      why:"Both count every value in the table exactly once, so both must equal the overall total. If they don't match, there's a mistake somewhere." }
  ]
};
</script>
<script src="quiz.js"></script>
</body>
</html>
