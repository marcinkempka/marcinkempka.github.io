<!-- accent colour for this quiz (Year 7 = indigo). Change just this to re-theme one quiz. -->
<body style="--accent:#4F46E5">
<main class="wrap">

  <a class="back" href="year7.html"><span aria-hidden="true">&larr;</span> Back to Year 7</a>

  <header class="head">
    <p class="eyebrow">Year 7 &middot; Analysing &amp; displaying data</p>
    <h1>Line Graphs &amp; Misleading Graphs</h1>
  </header>

  <!-- quiz shell — shared by every quiz; do not edit per quiz -->
  <div id="quiz">
    <div class="progress-row">
      <span id="counter">Question 1 of 10</span>
      <span id="runningScore">Score: 0</span>
    </div>
    <div class="bar"><i id="barFill"></i></div>
    <div class="card">
      <p class="qnum" id="qnum">Question 1</p>
      <p class="question" id="question">&nbsp;</p>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback">
        <p class="verdict" id="verdict"></p>
        <p class="why" id="why"></p>
      </div>
      <button class="next" id="nextBtn">Next question &rarr;</button>
    </div>
  </div>

  <div class="card result" id="result">
    <div class="score-num"><span id="finalScore">0</span><span id="outOf">/10</span></div>

    </div>

</main>

<!-- ===== The only part that changes per quiz: questions ===== -->
<script>
var SCUBA = { type:"line", labels:["0","10","20","30","40","50","60"], values:[15,14,12,8,6,5,4], xLabel:"Time (minutes)", yLabel:"Air (litres)" };
var WIND  = { type:"line", labels:["Mon","Tue","Wed","Thu","Fri","Sat","Sun"], values:[31,33,41,41,42,57,60], xLabel:"Day", yLabel:"Wind speed (knots)" };
var CANB  = { type:"line", labels:["J","F","M","A","M","J","J","A","S","O","N","D"], values:[20,21,17,13,9,6,5,7,9,12,15,18], xLabel:"Month", yLabel:"Temperature (°C)" };

window.QUIZ = {
  storeKey: "y7-line-graphs",
  appendEquals: false,
  questions: [
    { q:"The line graph shows the volume of air in a scuba tank during a dive. How much air was in the tank at the start of the dive?",
      chart:SCUBA,
      answer:"15 litres", options:["15 litres","14 litres","16 litres","12 litres"],
      why:"At 0 minutes the line starts at 15 litres." },
    { q:"Using the same graph — after how many minutes had the air dropped to 8 litres?",
      chart:SCUBA,
      answer:"30 minutes", options:["30 minutes","20 minutes","40 minutes","50 minutes"],
      why:"The line passes through 8 litres at 30 minutes." },
    { q:"Using the same graph — when was the diver using air the fastest (most active)?",
      chart:SCUBA,
      answer:"Between 20 and 30 minutes", options:["Between 20 and 30 minutes","Between 0 and 10 minutes","Between 40 and 50 minutes","Between 50 and 60 minutes"],
      why:"That's where the line is steepest — the air drops from 12 to 8 litres, a fall of 4 litres in 10 minutes." },
    { q:"The line graph shows the daily maximum wind speed in the Hebrides for one week. What is the range of the wind speeds?",
      chart:WIND,
      answer:"29 knots", options:["29 knots","60 knots","31 knots","26 knots"],
      why:"Range = highest − lowest = 60 − 31 = 29 knots." },
    { q:"Using the same graph — between which two days did the wind speed increase the most?",
      chart:WIND,
      answer:"Friday and Saturday", options:["Friday and Saturday","Saturday and Sunday","Tuesday and Wednesday","Monday and Tuesday"],
      why:"The line is steepest between Friday (42) and Saturday (57) — an increase of 15 knots." },
    { q:"The graph shows mean monthly temperatures in Canberra, Australia. Which are the three coldest months?",
      chart:CANB,
      answer:"June, July and August", options:["June, July and August","December, January and February","March, April and May","September, October and November"],
      why:"The lowest points on the graph are 6, 5 and 7 °C in June, July and August. Canberra is in the southern hemisphere, so winter falls in the middle of the year." },
    { q:"When a line graph shows changes over time, where should time go?",
      answer:"On the horizontal axis", options:["On the horizontal axis","On the vertical axis","On either axis","Time is not shown on a line graph"],
      why:"Time always goes on the horizontal (x) axis, so the line reads left to right as time passes." },
    { q:"On a graph axis, what does a zig-zag (break symbol) near the origin mean?",
      answer:"There is a break in the axis scale", options:["There is a break in the axis scale","The data is unreliable","The graph is finished","The values are negative"],
      why:"The zig-zag shows the scale does not start at 0 — part of the axis has been missed out." },
    { q:"A bar chart's vertical axis is labelled 0, 10, 20, 30 and then jumps straight to 80. Why is this misleading?",
      answer:"The scale is not evenly spaced", options:["The scale is not evenly spaced","The axis should be horizontal","There are too many labels","Bar charts never use numbers"],
      why:"An axis scale must go up in equal steps. Jumping from 30 to 80 squashes the top of the chart and distorts how the bars compare." },
    { q:"Two line graphs are compared: one has a vertical axis from 0 to 5, the other from 30 to 40. Why might comparing the two lines be misleading?",
      answer:"The vertical scales are different", options:["The vertical scales are different","The graphs use different colours","Line graphs cannot be compared","The horizontal axes show time"],
      why:"Different vertical scales make changes look bigger or smaller than they really are. To compare fairly, both graphs need the same scale." }
  ]
};
</script>
