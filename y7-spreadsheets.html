<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Year 7 — Spreadsheets &amp; Choosing Graphs</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="quiz.css">
</head>
<!-- accent colour for this quiz (Year 7 = indigo). Change just this to re-theme one quiz. -->
<body style="--accent:#4F46E5">
<main class="wrap">

  <a class="back" href="year7.html"><span aria-hidden="true">&larr;</span> Back to Year 7</a>

  <header class="head">
    <p class="eyebrow">Year 7 &middot; Analysing &amp; displaying data</p>
    <h1>Spreadsheets &amp; Choosing Graphs</h1>
  </header>

  <!-- quiz shell — shared by every quiz; do not edit per quiz -->
  <div id="quiz">
    <div class="progress-row">
      <span id="counter">Question 1 of 10</span>
      <span id="runningScore">Score: 0</span>
    </div>
    <div class="bar"><i id="barFill"></i></div>
    <div class="card">
      <p class="qnum" id="qnum">Question 1</p>
      <p class="question" id="question">&nbsp;</p>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback">
        <p class="verdict" id="verdict"></p>
        <p class="why" id="why"></p>
      </div>
      <button class="next" id="nextBtn">Next question &rarr;</button>
    </div>
  </div>

  <div class="card result" id="result">
    <div class="score-num"><span id="finalScore">0</span><span id="outOf">/10</span></div>
    <p class="msg" id="resultMsg"></p>
    <p class="best" id="bestLine"></p>
    <div class="actions">
      <button class="btn primary" id="againBtn">Try again</button>
      <a class="btn ghost" href="year7.html">Back to Year 7</a>
    </div>
  </div>

</main>

<!-- ===== The only part that changes per quiz: questions ===== -->
<script>
var GRID = [["","A","B"],["1","81","16"],["2","54","25"]];
var LAUREN = { type:"bar", labels:["Mon","Tue","Wed","Thu","Fri","Sat","Sun"], values:[30,45,45,15,70,120,60], xLabel:"Day", yLabel:"Time (minutes)" };
var ANITA = { type:"bar", labels:["clarinet","violin","piano","saxophone","drum"], values:[3,8,5,4,5], xLabel:"Instrument", yLabel:"Number of girls" };

window.QUIZ = {
  storeKey: "y7-spreadsheets",
  appendEquals: false,
  questions: [
    { q:"The table shows part of a spreadsheet. What number is in cell B2?",
      table:GRID,
      answer:"25", options:["25","54","16","81"],
      why:"Cell B2 is where column B meets row 2 — it contains 25." },
    { q:"Using the same spreadsheet — which cell is the number 81 in?",
      table:GRID,
      answer:"A1", options:["A1","B1","A2","B2"],
      why:"81 is in column A, row 1 — cell A1." },
    { q:"What does typing = at the start of a spreadsheet cell tell the spreadsheet to do?",
      answer:"Calculate something", options:["Calculate something","Make the text bold","Delete the cell","Sort the data"],
      why:"Typing = tells the spreadsheet the cell contains a formula to calculate, like =mode( or =average(." },
    { q:"Which spreadsheet formula finds the mean of a set of data?",
      answer:"=average(", options:["=average(","=mean(","=median(","=mode("],
      why:"Spreadsheets use the word 'average' instead of 'mean', so you type =average( and select the data." },
    { q:"Data is sorted from smallest to largest in cells A1 to A10. Which formula works out the range?",
      answer:"=A10-A1", options:["=A10-A1","=A1-A10","=A10+A1","=average(A1:A10)"],
      why:"Range = largest − smallest. After sorting, the largest value is in A10 and the smallest in A1, so =A10-A1." },
    { q:"The numbers of weeks the ten most popular UK singles stayed in the Top 10 were: 14, 10, 12, 16, 10, 11, 11, 13, 12, 10. What is the mode?",
      answer:"10", options:["10","11","12","16"],
      why:"10 appears three times — more than any other value." },
    { q:"For the same data (sorted: 10, 10, 10, 11, 11, 12, 12, 13, 14, 16), what is the median?",
      answer:"11.5", options:["11.5","11","12","13"],
      why:"With 10 values, the median is halfway between the 5th and 6th values: (11 + 12) ÷ 2 = 11.5." },
    { q:"Lauren drew this bar chart of the time she spent playing a computer game. On which day did she play for the longest?",
      chart:LAUREN,
      answer:"Saturday", options:["Saturday","Friday","Sunday","Wednesday"],
      why:"The tallest bar is Saturday, at 120 minutes." },
    { q:"Using the same chart — what is the mean time Lauren played per day?",
      chart:LAUREN,
      answer:"55 minutes", options:["55 minutes","45 minutes","60 minutes","120 minutes"],
      why:"Total = 30 + 45 + 45 + 15 + 70 + 120 + 60 = 385 minutes over 7 days. 385 ÷ 7 = 55." },
    { q:"Anita asked 25 girls in Year 7 which instrument they liked most and drew this bar chart. Which instrument is the mode?",
      chart:ANITA,
      answer:"Violin", options:["Violin","Piano","Drum","Clarinet"],
      why:"The mode is the most common answer — the tallest bar is violin, with 8 girls." }
  ]
};
</script>
<script src="quiz.js"></script>
</body>
</html>
