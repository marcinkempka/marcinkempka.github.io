<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Year 8 — Multiplying &amp; Dividing Negatives</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F5F6F9; --surface:#FFFFFF; --ink:#0F172A; --muted:#647084; --line:#E6E9EF;
    --accent:#0D9488;          /* Year 8 teal */
    --correct:#0D9488; --wrong:#DB2777;
    --radius:18px;
    --shadow:0 1px 2px rgba(15,23,42,.04), 0 10px 30px rgba(15,23,42,.06);
    --font:"Plus Jakarta Sans", system-ui, -apple-system, sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);color:var(--ink);background:var(--bg);min-height:100vh;line-height:1.55;-webkit-font-smoothing:antialiased}
  .wrap{max-width:640px;margin:0 auto;padding:clamp(24px,5vw,52px) clamp(18px,5vw,28px) 64px}
  a{color:inherit;text-decoration:none}
  .back{display:inline-flex;align-items:center;gap:8px;font-weight:600;font-size:.9rem;color:var(--muted);margin-bottom:24px}
  .back:hover,.back:focus-visible{color:var(--accent);outline:none}

  .head{margin-bottom:24px}
  .head .eyebrow{font-weight:700;font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
  .head h1{font-weight:800;font-size:clamp(1.7rem,6vw,2.4rem);line-height:1.05;letter-spacing:-.02em}

  .progress-row{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:12px;font-size:.85rem;color:var(--muted);font-weight:600}
  .bar{height:8px;background:#E9ECF1;border-radius:99px;overflow:hidden;margin-bottom:24px}
  .bar > i{display:block;height:100%;width:0;background:var(--accent);transition:width .3s ease;border-radius:99px}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:clamp(22px,4vw,32px);box-shadow:var(--shadow)}
  .qnum{font-weight:700;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:12px}
  .question{font-weight:800;font-size:clamp(2rem,8vw,2.8rem);letter-spacing:-.02em;margin-bottom:24px}

  .options{display:grid;gap:10px}
  .opt{
    display:flex;align-items:center;gap:12px;width:100%;text-align:left;cursor:pointer;
    font-family:var(--font);font-size:1.12rem;font-weight:600;color:var(--ink);
    background:var(--surface);border:1.5px solid var(--line);border-radius:12px;padding:15px 16px;
    transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease, background .12s ease;
  }
  .opt .key{flex:none;width:30px;height:30px;display:grid;place-items:center;border-radius:8px;background:#EEF1F5;font-size:.85rem;font-weight:700;color:var(--muted)}
  .opt:not(:disabled):hover{border-color:color-mix(in srgb,var(--accent) 50%,var(--line));box-shadow:0 8px 22px color-mix(in srgb,var(--accent) 16%,transparent);transform:translateY(-2px)}
  .opt:focus-visible{outline:3px solid var(--accent);outline-offset:2px}
  .opt:disabled{cursor:default}
  .opt.correct{background:color-mix(in srgb,var(--correct) 10%,#fff);border-color:var(--correct)}
  .opt.correct .key{background:var(--correct);color:#fff}
  .opt.wrong{background:color-mix(in srgb,var(--wrong) 8%,#fff);border-color:var(--wrong)}
  .opt.wrong .key{background:var(--wrong);color:#fff}
  .opt.dim{opacity:.45}

  .feedback{margin-top:18px;border-top:1px solid var(--line);padding-top:16px;display:none}
  .feedback.show{display:block;animation:fade .25s ease both}
  .feedback .verdict{font-weight:800;font-size:1.05rem;margin-bottom:4px}
  .feedback .verdict.right{color:var(--correct)}
  .feedback .verdict.nope{color:var(--wrong)}
  .feedback .why{color:var(--muted);font-size:.97rem;font-weight:500}

  .next{margin-top:18px;display:none;width:100%;cursor:pointer;font-family:var(--font);font-weight:700;font-size:1.02rem;color:#fff;background:var(--ink);border:none;border-radius:12px;padding:14px 18px;transition:transform .12s ease, box-shadow .12s ease}
  .next.show{display:block}
  .next:hover{transform:translateY(-2px);box-shadow:0 10px 26px rgba(15,23,42,.18)}
  .next:focus-visible{outline:3px solid var(--accent);outline-offset:2px}

  .result{text-align:center;display:none}
  .result.show{display:block;animation:fade .3s ease both}
  .result .score-num{font-weight:800;font-size:clamp(3.4rem,14vw,5rem);line-height:1;color:var(--accent);letter-spacing:-.03em}
  .result .score-num span{color:var(--muted);font-size:.4em}
  .result .msg{font-weight:800;font-size:1.3rem;margin:8px 0 6px}
  .result .best{color:var(--muted);font-size:.95rem;margin-bottom:24px;font-weight:500}
  .actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  .btn{cursor:pointer;font-family:var(--font);font-weight:700;font-size:1rem;border-radius:12px;padding:13px 22px;border:1.5px solid var(--line);transition:transform .12s ease, box-shadow .12s ease}
  .btn:hover{transform:translateY(-2px);box-shadow:0 10px 26px rgba(15,23,42,.12)}
  .btn:focus-visible{outline:3px solid var(--accent);outline-offset:2px}
  .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  .btn.ghost{background:var(--surface);color:var(--ink)}

  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<main class="wrap">

  <a class="back" href="year8.html"><span aria-hidden="true">&larr;</span> Back to Year 8</a>

  <header class="head">
    <p class="eyebrow">Year 8 &middot; Number</p>
    <h1>Multiplying &amp; Dividing Negatives</h1>
  </header>

  <div id="quiz">
    <div class="progress-row">
      <span id="counter">Question 1 of 10</span>
      <span id="runningScore">Score: 0</span>
    </div>
    <div class="bar"><i id="barFill"></i></div>

    <div class="card">
      <p class="qnum" id="qnum">Question 1</p>
      <p class="question" id="question">&nbsp;</p>
      <div class="options" id="options"></div>

      <div class="feedback" id="feedback">
        <p class="verdict" id="verdict"></p>
        <p class="why" id="why"></p>
      </div>

      <button class="next" id="nextBtn">Next question &rarr;</button>
    </div>
  </div>

  <div class="card result" id="result">
    <div class="score-num"><span id="finalScore">0</span><span>/10</span></div>
    <p class="msg" id="resultMsg"></p>
    <p class="best" id="bestLine"></p>
    <div class="actions">
      <button class="btn primary" id="againBtn">Try again</button>
      <a class="btn ghost" href="year8.html">Back to Year 8</a>
    </div>
  </div>

</main>

<script>
(function(){
  "use strict";
  var QUESTIONS = [
    { q:"-6 × 4", answer:"-24", options:["-24","24","-2","10"], why:"A negative times a positive is negative. 6 × 4 = 24, so -24." },
    { q:"-7 × -3", answer:"21", options:["21","-21","-10","-4"], why:"Negative times negative is positive. 7 × 3 = 21." },
    { q:"-20 ÷ 5", answer:"-4", options:["-4","4","-15","-100"], why:"Negative ÷ positive is negative. 20 ÷ 5 = 4, so -4." },
    { q:"-36 ÷ -9", answer:"4", options:["4","-4","-45","27"], why:"Negative ÷ negative is positive. 36 ÷ 9 = 4." },
    { q:"8 × -5", answer:"-40", options:["-40","40","-3","13"], why:"Positive times negative is negative. 8 × 5 = 40, so -40." },
    { q:"-9 × -6", answer:"54", options:["54","-54","-15","15"], why:"Two negatives make a positive. 9 × 6 = 54." },
    { q:"48 ÷ -8", answer:"-6", options:["-6","6","-40","56"], why:"Positive ÷ negative is negative. 48 ÷ 8 = 6, so -6." },
    { q:"-7 × 7", answer:"-49", options:["-49","49","0","-14"], why:"Negative times positive is negative. 7 × 7 = 49, so -49." },
    { q:"-56 ÷ -7", answer:"8", options:["8","-8","-49","63"], why:"Negative ÷ negative is positive. 56 ÷ 7 = 8." },
    { q:"-3 × -4 × -2", answer:"-24", options:["-24","24","-9","9"], why:"Three negative signs give a negative answer. 3 × 4 × 2 = 24, so -24." }
  ];
  var KEYS = ["A","B","C","D"];
  var STORE_KEY = "y8-negatives-best";
  var order=[], idx=0, score=0, locked=false;
  var el={quiz:document.getElementById("quiz"),counter:document.getElementById("counter"),running:document.getElementById("runningScore"),bar:document.getElementById("barFill"),qnum:document.getElementById("qnum"),question:document.getElementById("question"),options:document.getElementById("options"),feedback:document.getElementById("feedback"),verdict:document.getElementById("verdict"),why:document.getElementById("why"),next:document.getElementById("nextBtn"),result:document.getElementById("result"),finalScore:document.getElementById("finalScore"),resultMsg:document.getElementById("resultMsg"),bestLine:document.getElementById("bestLine"),again:document.getElementById("againBtn")};
  function shuffle(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
  function safeGetBest(){try{var v=localStorage.getItem(STORE_KEY);return v===null?null:parseInt(v,10);}catch(e){return null;}}
  function safeSetBest(v){try{localStorage.setItem(STORE_KEY,String(v));}catch(e){}}
  function start(){order=shuffle(QUESTIONS);idx=0;score=0;locked=false;el.result.classList.remove("show");el.quiz.style.display="";render();}
  function render(){
    locked=false;var item=order[idx];
    el.counter.textContent="Question "+(idx+1)+" of "+order.length;
    el.running.textContent="Score: "+score;
    el.bar.style.width=(idx/order.length*100)+"%";
    el.qnum.textContent="Question "+(idx+1);
    el.question.textContent=item.q+" =";
    el.feedback.classList.remove("show");el.verdict.className="verdict";
    el.next.classList.remove("show");
    el.next.textContent=(idx===order.length-1)?"See results →":"Next question →";
    el.options.innerHTML="";
    shuffle(item.options).forEach(function(opt,i){
      var b=document.createElement("button");b.className="opt";
      b.innerHTML='<span class="key">'+KEYS[i]+'</span><span>'+opt+'</span>';
      b.addEventListener("click",function(){choose(b,opt,item);});
      el.options.appendChild(b);
    });
  }
  function choose(btn,chosen,item){
    if(locked)return;locked=true;
    var correct=(chosen===item.answer);if(correct)score++;
    el.options.querySelectorAll(".opt").forEach(function(b){
      b.disabled=true;var label=b.querySelector("span:last-child").textContent;
      if(label===item.answer)b.classList.add("correct");
      else if(b===btn)b.classList.add("wrong");
      else b.classList.add("dim");
    });
    el.running.textContent="Score: "+score;
    el.verdict.textContent=correct?"Correct!":"Not quite";
    el.verdict.classList.add(correct?"right":"nope");
    el.why.textContent=item.why;
    el.feedback.classList.add("show");el.next.classList.add("show");el.next.focus();
  }
  function nextQ(){if(idx<order.length-1){idx++;render();window.scrollTo({top:0,behavior:"smooth"});}else{finish();}}
  function finish(){
    el.bar.style.width="100%";el.quiz.style.display="none";el.finalScore.textContent=score;
    var msg;if(score===10)msg="Perfect score! 🎉";else if(score>=8)msg="Great work!";else if(score>=5)msg="Good effort — keep practising.";else msg="Keep going, you'll get there.";
    el.resultMsg.textContent=msg;
    var prevBest=safeGetBest();
    if(prevBest===null||score>prevBest){safeSetBest(score);el.bestLine.textContent="New best score!";}
    else{el.bestLine.textContent="Your best so far: "+prevBest+"/10";}
    el.result.classList.add("show");window.scrollTo({top:0,behavior:"smooth"});
  }
  el.next.addEventListener("click",nextQ);el.again.addEventListener("click",start);start();
})();
</script>
</body>
</html>
