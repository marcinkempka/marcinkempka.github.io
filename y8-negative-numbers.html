<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Year 8 — Multiplying &amp; Dividing Negatives</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="quiz.css">
</head>
<!-- accent colour for this quiz (Year 8 = teal). Change just this to re-theme one quiz. -->
<body style="--accent:#0D9488">
<main class="wrap">

  <a class="back" href="year8.html"><span aria-hidden="true">&larr;</span> Back to Year 8</a>

  <header class="head">
    <p class="eyebrow">Year 8 &middot; Number</p>
    <h1>Multiplying &amp; Dividing Negatives</h1>
  </header>

  <!-- quiz shell — shared by every quiz; do not edit per quiz -->
  <div id="quiz">
    <div class="progress-row">
      <span id="counter">Question 1 of 10</span>
      <span id="runningScore">Score: 0</span>
    </div>
    <div class="bar"><i id="barFill"></i></div>
    <div class="card">
      <p class="qnum" id="qnum">Question 1</p>
      <p class="question" id="question">&nbsp;</p>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback">
        <p class="verdict" id="verdict"></p>
        <p class="why" id="why"></p>
      </div>
      <button class="next" id="nextBtn">Next question &rarr;</button>
    </div>
  </div>

  <div class="card result" id="result">
    <div class="score-num"><span id="finalScore">0</span><span id="outOf">/10</span></div>
    <p class="msg" id="resultMsg"></p>
    <p class="best" id="bestLine"></p>
    <div class="actions">
      <button class="btn primary" id="againBtn">Try again</button>
      <a class="btn ghost" href="year8.html">Back to Year 8</a>
    </div>
  </div>

</main>

<!-- ===== The only part that changes per quiz: questions ===== -->
<script>
window.QUIZ = {
  storeKey: "y8-negatives",
  questions: [
    { q:"-6 × 4", answer:"-24", options:["-24","24","-2","10"], why:"A negative times a positive is negative. 6 × 4 = 24, so -24." },
    { q:"-7 × -3", answer:"21", options:["21","-21","-10","-4"], why:"Negative times negative is positive. 7 × 3 = 21." },
    { q:"-20 ÷ 5", answer:"-4", options:["-4","4","-15","-100"], why:"Negative ÷ positive is negative. 20 ÷ 5 = 4, so -4." },
    { q:"-36 ÷ -9", answer:"4", options:["4","-4","-45","27"], why:"Negative ÷ negative is positive. 36 ÷ 9 = 4." },
    { q:"8 × -5", answer:"-40", options:["-40","40","-3","13"], why:"Positive times negative is negative. 8 × 5 = 40, so -40." },
    { q:"-9 × -6", answer:"54", options:["54","-54","-15","15"], why:"Two negatives make a positive. 9 × 6 = 54." },
    { q:"48 ÷ -8", answer:"-6", options:["-6","6","-40","56"], why:"Positive ÷ negative is negative. 48 ÷ 8 = 6, so -6." },
    { q:"-7 × 7", answer:"-49", options:["-49","49","0","-14"], why:"Negative times positive is negative. 7 × 7 = 49, so -49." },
    { q:"-56 ÷ -7", answer:"8", options:["8","-8","-49","63"], why:"Negative ÷ negative is positive. 56 ÷ 7 = 8." },
    { q:"-3 × -4 × -2", answer:"-24", options:["-24","24","-9","9"], why:"Three negative signs give a negative answer. 3 × 4 × 2 = 24, so -24." }
  ]
};
</script>
<script src="quiz.js"></script>
</body>
</html>
